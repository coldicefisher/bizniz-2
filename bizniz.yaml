# bizniz.yaml — model + escalation configuration for the pipeline.
#
# This file is loaded once per build (via BiznizConfig.find_and_load).
# Models are routed by name prefix:
#   - claude-*    → Claude
#   - gemini-*    → Gemini
#   - else        → OpenAI
#
# ╔═══════════════════════════════════════════════════════════════════╗
# ║  AGENT-SPECIFIC MODELS (every role names its own model — required)║
# ╚═══════════════════════════════════════════════════════════════════╝
#
# Each named role uses its model for ALL its calls. There is NO shared
# default_model fallback — every role's model is named explicitly so a
# typo or omission hard-fails at config load rather than silently
# routing to a generic default.

# ╔═══════════════════════════════════════════════════════════════════╗
# ║  TIER STRATEGY (2026-05-18)                                       ║
# ╚═══════════════════════════════════════════════════════════════════╝
#
# Two-fixture perf validation (BE-006 + BA-fix2-2 — see docs/perf_tests/)
# established that Haiku 4.5 ships complex multi-file production-grade
# issues at parity quality with Opus 4.7 in 42% less wall time. Combined
# with ~4-5× cheaper per-token rate, that's ~7-9× cheaper end-to-end on
# Coder-class work.
#
# So the default is: **Haiku 4.5 for high-volume execution roles (Coder,
# Tester, repair), Opus 4.7 for orchestration roles where reasoning depth
# dominates per-call cost** (Planner, Architect, ServicePlanner,
# AuthPlanner, QualityEngineer, CodeReviewer, integration testers, the
# Decomposer when opted-in, and the AgenticDebugger which IS the
# escalation tier itself).
#
# Per-role escalation lists below progress Haiku → Opus → Opus so that
# stall-detection escalates to the better model rather than retrying
# at the same tier.
#
# Model-name syntax: ``claude-cli`` (= CLI's active model, default
# Opus on Max plan) or ``claude-cli:<anthropic-model-id>`` to pin
# a specific model. See bizniz/clients/claude_cli/model_name.py.

# The Engineer plans the work for each service: requirements, use cases,
# domain models, issues. Single call per service, reasoning-heavy.
engineer_model: claude-cli:claude-opus-4-7

# Escalation chain when Engineer detects a repetition stall (same
# action three of the last five iterations). Stays on Opus across
# tiers — the Engineer's job is planning + decomposition, where
# Haiku-on-stall would compound the wrong direction.
engineer_escalation:
  - claude-cli:claude-opus-4-7
  - claude-cli:claude-opus-4-7
  - claude-cli:claude-opus-4-7

# The Architect decomposes the project into services and orchestrates
# the milestone walk. One call per milestone, so quality > cost.
architect_model: claude-cli:claude-opus-4-7

# The Planner runs once per project (or rarely on re-plans) and its
# output drives the entire build sequence — top-tier worth the
# rounding-error cost.
planner_model: claude-cli:claude-opus-4-7

# Top-tier model for integration test generation (HTTPApiTester +
# WebUITester). Hallucinations here get amplified by the debugger
# into real code corruption (e.g. fake /grooming routes appearing in
# a property-manager app), so we pay for the better model.
integration_tester_model: claude-cli:claude-opus-4-7

# Legacy single-tier debugger model — only used as a fallback when
# `debugger_escalation` (further down) is empty. The active config
# is the escalation chain, not this field.
debugger_model: claude-cli:claude-opus-4-7


# ╔═══════════════════════════════════════════════════════════════════╗
# ║  STALL ESCALATION LISTS (unit-test-time)                          ║
# ╚═══════════════════════════════════════════════════════════════════╝
#
# These are simple ordered lists of model names — NOT array-of-hashes
# like `debugger_escalation` below. They drive the
# `bizniz/orchestrator/model_progression.py` ModelProgression class:
# start at index 0 (cheapest), call .escalate() on stall to move to
# the next entry, until the list is exhausted.
#
# Each list is consumed by CodingOrchestrator at __init__ time and
# escalates on stall during unit-test-driven code generation. Per-
# entry parameters (turns, attempts) are not needed here because
# each call is one-shot — escalation just means "use stronger next."
#
# All three lists below are REQUIRED — there's no shared
# ``models`` fallback. Each list must have at least one entry.
# A bizniz.yaml that's missing any of them hard-fails at load
# rather than silently routing to a generic default.

# Coder agent: writes the actual code in a target file based on the
# issue description + tests. Default Haiku 4.5 (validated 2026-05-18
# against the BA-fix2-2 fat-fails fixture — 14/14 + AST + symbols
# clean, beat Opus by 42% wall). Escalates to Opus on stall, then
# Opus again as a defense in depth.
coder_models:
  - claude-cli:claude-haiku-4-5
  - claude-cli:claude-opus-4-7
  - claude-cli:claude-opus-4-7

# Tester agent: writes the tests for an issue based on the issue
# description and target signatures. Same tier strategy as Coder —
# Haiku starts cheap, Opus on stall.
tester_models:
  - claude-cli:claude-haiku-4-5
  - claude-cli:claude-opus-4-7
  - claude-cli:claude-opus-4-7

# QuickDebugger inline repair: fixes test failures via single-call
# diagnose-and-patch (no agentic tool loop). Already skipping the
# cheapest tier; with Haiku as start tier and Opus on escalation
# the pattern matches Coder/Tester.
repair_models:
  - claude-cli:claude-haiku-4-5
  - claude-cli:claude-opus-4-7


# ╔═══════════════════════════════════════════════════════════════════╗
# ║  AGENTIC DEBUG ESCALATION (integration-test-time)                 ║
# ╚═══════════════════════════════════════════════════════════════════╝
#
# Array-of-hashes — each tier has its own model + per-attempt
# tool-iteration budget + retry count. Used by:
#   - The integration debugger (post-test-run repair against a live
#     stack via the bizniz/integration/debug_loop.py)
#   - The post-flight repair loop (mypy/tsc fixes via
#     bizniz/engineer/post_flight_repair.py)
#   - The FA debugger (auth-config repair via
#     bizniz/auth/debugger.py — uses the same escalation specs)
#
# Field semantics:
#   tool_iterations  = LLM round-trips (each typically a tool call:
#                      view_file, run_command, inspect_container, etc.)
#                      within ONE diagnose-and-fix attempt.
#   repair_attempts  = independent diagnose-and-fix sessions before
#                      escalating to the next tier.
#
# Tiers run in order. Each attempt within a tier sees the sticky
# .bizniz_repair_log.json so subsequent attempts compound on prior
# diagnoses rather than restarting.
#
# Cost-vs-capability calibration (post v25 lessons): cheap-grinding
# on flash-lite for 20×20 attempts wastes time on auth/JWT-class
# bugs because the model can't hold the multi-file context across
# iterations. Skip straight from triage to flash-top, then escalate
# to pro when flash-top is stuck.
debugger_escalation:
  # Tier 1 — quick-pass triage. Short tool-iteration budget so we
  # bail fast on truly trivial bugs (typo, wrong import, missing
  # field name) without burning a long Claude session. Two attempts
  # because the sticky log compounds — a second pass with the prior
  # diagnosis in context often nails the fix. Haiku is plenty for
  # triage-class fixes and ~5× cheaper per tool call.
  - model: claude-cli:claude-haiku-4-5
    tool_iterations: 4
    repair_attempts: 2
  # Tier 2 — workhorse grind. 40 tool iterations per attempt lets the
  # model view multiple files + do live runtime introspection
  # (run_python_in_container, hit_endpoint, inspect_env, decode_jwt)
  # before forming a diagnosis. 5 attempts because the sticky log
  # builds across attempts. Opus once we're past triage — the
  # multi-file reasoning + sticky log compounding is where Opus
  # earns its keep.
  - model: claude-cli:claude-opus-4-7
    tool_iterations: 40
    repair_attempts: 5
  # Tier 3 — final escalation. 24 iterations to use live-introspection
  # tools for config / auth bugs. 2 attempts only — if a fresh Claude
  # session with the full sticky log can't fix it after this much
  # context, the bug is structural (wrong skeleton, wrong contract)
  # and surfaces for human review.
  - model: claude-cli:claude-opus-4-7
    tool_iterations: 24
    repair_attempts: 2


# ╔═══════════════════════════════════════════════════════════════════╗
# ║  ORCHESTRATION KNOBS                                              ║
# ╚═══════════════════════════════════════════════════════════════════╝

# Legacy three-phase strategy parameters. The active path is
# debugger_escalation; these stay as a single-tier fallback only.
debugger_max_iterations: 12
stall_threshold: 3
agentic_debug_threshold: 2
enable_agentic_debug: false

# Engineer's three-phase code-generation strategy: dispatch issues
# in dependency-order layers, each layer fully resolves before the
# next starts. Set false to dispatch issues serially in declaration
# order (slower but easier to debug a stuck run).
layered_generation: true

# Architect dispatches engineers per service in parallel when true.
# Bounded by max_service_workers — set higher than your CPU count
# only if most service work is I/O-bound (LLM calls).
parallel_services: true
max_service_workers: 4

# Per-issue iteration cap inside CodingOrchestrator. Hit this and the
# orchestrator gives up on the issue (which propagates to the engineer
# as a service-level failure for that ticket).
max_iterations: 30
