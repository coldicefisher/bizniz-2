default_model: gemini-flash-lite
engineer_model: gemini-flash
architect_model: gemini-flash-top
# Top-tier model for the Planner. The Planner runs once per project (or
# rarely on re-plans) and its output drives the entire build sequence,
# so the cost is rounding-error and the quality bump is foundational.
planner_model: gemini-flash-top
models:
  - gemini-flash-lite
  - gemini-flash
  - gemini-flash-top
coder_models:
  - gemini-flash-lite
  - gemini-flash
  - gemini-flash-top
tester_models:
  - gemini-flash-lite
  - gemini-flash
  - gemini-flash-top
repair_models:
  - gemini-flash
  - gemini-flash-top
# Three-phase strategy (run_three_phase): top-tier model for the agentic
# debugging round and the per-ticket iteration cap there.
# Legacy single-tier debugger model (used as a fallback only when
# debugger_escalation is empty). The active config is the escalation
# chain below.
debugger_model: gemini-flash-top
debugger_escalation:
  # First tier: many cheap turns to handle the common case. Each
  # attempt sees the sticky repair log so the 10 passes compound on
  # each other rather than restarting from zero.
  - model: gemini-flash-top
    max_turns: 12
    repair_attempts: 10
  # Escalation: stronger model with fewer turns. Sees flash-top's
  # full repair log so it doesn't redo the obvious-fix attempts.
  - model: gemini-pro
    max_turns: 8
    repair_attempts: 1
# Top-tier model for integration test generation. Hallucinations here
# get amplified by the debugger into real code corruption (e.g. fake
# /grooming routes appearing in a property-manager app), so we pay
# for the better model.
integration_tester_model: gemini-pro
debugger_max_iterations: 12
stall_threshold: 3
agentic_debug_threshold: 2
enable_agentic_debug: false
layered_generation: true
parallel_services: true
max_service_workers: 4
max_iterations: 20
