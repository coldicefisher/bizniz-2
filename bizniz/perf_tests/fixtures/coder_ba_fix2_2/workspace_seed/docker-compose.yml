services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_dev
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app_dev@db:5432/app
      ENVIRONMENT: development
      SECRET_KEY: dev-secret-key-change-in-production
    depends_on:
      - db

volumes:
  pgdata:
