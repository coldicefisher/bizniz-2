[mypy]
# Skeleton-shipped mypy configuration. The engineer can extend
# this in milestone work but should leave the per-module overrides
# below alone — they exist to avoid framework-glue noise that
# isn't domain code.
ignore_missing_imports = True
check_untyped_defs = True

# app/main.py is FastAPI bootstrap glue. It does
# ``app = FastAPI(...)`` which shadows the surrounding ``app/``
# package and produces unfixable-without-renaming attr-defined
# noise. Engineer doesn't extend this file — domain code goes in
# app/api/routes/, app/schemas/, app/models/.
[mypy-app.main]
ignore_errors = True
